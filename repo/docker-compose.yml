services:
  db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: talentops
      POSTGRES_USER: talentops
      POSTGRES_PASSWORD: talentops_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentops -d talentops"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: talentops
      DB_PASSWORD: talentops_secret
      DB_NAME: talentops
      JWT_SECRET: talentops-jwt-secret-change-in-production
      JWT_EXPIRES_IN: "24h"
      ENCRYPTION_KEY: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
      UPLOAD_DIR: /app/uploads
      NOTIFICATION_EXPORT_DIR: /app/exports/notifications
      LOG_LEVEL: info
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Test-only services (docker compose --profile test run --rm <service>) ──

  frontend-test:
    build:
      context: .
      dockerfile: frontend/Dockerfile.test
    profiles: ["test"]
    environment:
      # Wrapper adds --no-sandbox so Chromium can run as root inside Docker
      CHROME_BIN: /usr/local/bin/chromium-no-sandbox
      CI: "true"
    # Does not depend on the running stack; Angular unit tests use HttpTestingController,
    # so no real backend is needed.

  e2e:
    build:
      context: ./tests/e2e
      dockerfile: Dockerfile
    profiles: ["test"]
    environment:
      # host.docker.internal:4200 reaches the frontend port-mapped on the host,
      # avoiding Chromium's DNS resolution issues with Docker service names.
      PLAYWRIGHT_BASE_URL: http://host.docker.internal:4200
      CI: "true"
    extra_hosts:
      # Ensures host.docker.internal resolves on Linux Docker (auto-provided on Docker Desktop).
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
